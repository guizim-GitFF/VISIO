<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/Marca/Simbolo/SimboloDark.jpg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

  <title>Perfil — VISIO Admin</title>

  <style>
    .foto_adm_wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .btn-mudar-foto {
      display: inline-block;
      padding: 8px 16px;
      background-color: var(--color-accent-adm, #3a86ff);
      /* Usa a sua cor primária */
      color: #ffffff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .btn-mudar-foto:hover {
      background-color: #2668d1;
    }

    .foto_adm {
      object-fit: cover;
      width: 150px;
      height: 150px;
      border-radius: 50%;
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <img src="assets/Marca/Logo/LogoDark.jpg" class="logo" alt="Logo VISIO" id="logo">
      <ul class="nav-links">
        <li><a href="inicio_adm.html"><i class="fa-solid fa-house"></i> Início</a></li>
        <li><a href="perfil_adm.html"><i class="fa-solid fa-user"></i> Perfil</a></li>
        <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Sair</a></li>
        <li><button id="theme-toggle">
            <i id="icon-sun" class="fa-solid fa-sun"></i>
            <i id="icon-moon" class="fa-solid fa-moon"></i>
          </button></li>
      </ul>
    </nav>
  </header>
  <div class="app-container">
    <aside class="sidebar">
      <nav class="menu">
        <ul>
          <li><a href="inicio_adm.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
          <li><a href="lista.php"><i class="fa-solid fa-users"></i> Usuários</a></li>
          <li><a href="cadastrar_questoes_adm.html"><i class="fa-solid fa-clipboard-list"></i> Questões</a></li>
          <li><a href="cadastrar_sensor_ADM.html"><i class="fa-solid fa-microchip"></i> Sensores</a></li>

        </ul>
      </nav>
    </aside>
    <div class="adm-main-area">
      <h1 class="adm-page-title">Perfil do administrador</h1>
      <div class="container_perfil_adm adm-perfil-layout">

        <div class="foto_adm_wrap">
          <img class="foto_adm" id="preview_foto" src="images/foto_adm_perfil.jpeg" alt="Foto do administrador">

          <input type="file" id="foto_upload" accept="image/*" style="display: none;">

          <label for="foto_upload" class="btn-mudar-foto">
            <i class="fa-solid fa-camera"></i> Mudar foto
          </label>
        </div>
        <section class="adm-form-card adm-perfil-form">
          <h2>Dados de contato</h2>
          <form id="perfil-form">
            <label for="nome_adm">Nome</label>
            <input type="text" id="nome_adm" name="nome" value="Matheus Neri">

            <label for="tel_adm">Telefone</label>
            <input type="tel" id="tel_adm" name="telefone" value="(19) 99315-1477">

            <label for="email_adm">E-mail</label>
            <input type="email" id="email_adm" name="email" value="matheusferreiracom15@gmail.com">

            <label for="cnpj_adm">CNPJ (instituição)</label>
            <input type="text" id="cnpj_adm" name="cnpj" placeholder="00.000.000/0001-00">

            <button type="submit" class="btn-salvar" style="color: #fff;"><i class="fa-solid fa-floppy-disk"></i> Salvar
              alterações</button>
          </form>
          <p class="perfil-aviso" id="perfil-msg" hidden>Alterações guardadas neste dispositivo (demonstração).</p>
        </section>
      </div>
    </div>
  </div>
  <footer>
    &copy;2026 VISIO – Plataforma Inteligente para Identificação e Gestão de Sensores IoT em Ambientes Educacionais.
  </footer>
  <script>
    (function () {
      var form = document.getElementById("perfil-form");
      var msg = document.getElementById("perfil-msg");
      var keys = ["nome_adm", "tel_adm", "email_adm", "cnpj_adm"];

      keys.forEach(function (id) {
        var el = document.getElementById(id);
        var k = "visio_perfil_" + id;
        var v = localStorage.getItem(k);
        if (v) el.value = v;
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        keys.forEach(function (id) {
          var el = document.getElementById(id);
          localStorage.setItem("visio_perfil_" + id, el.value);
        });
        msg.hidden = false;
        setTimeout(function () { msg.hidden = true; }, 4000);
      });
      var fotoInput = document.getElementById("foto_upload");
      var fotoPreview = document.getElementById("preview_foto");
      var fotoSalva = localStorage.getItem("visio_perfil_foto_dados");
      if (fotoSalva) {
        fotoPreview.src = fotoSalva;
      }
      fotoInput.addEventListener("change", function (event) {
        var file = event.target.files[0];
        if (file) {
          var reader = new FileReader();
          reader.onload = function (e) {
            var fotoBase64 = e.target.result;
            fotoPreview.src = fotoBase64;
            try {
              localStorage.setItem("visio_perfil_foto_dados", fotoBase64);
            } catch (erro) {
              console.warn("A imagem é muito grande para ser salva no navegador localmente.");
            }
          };
          reader.readAsDataURL(file);
        }
      });
    })();
  </script>
  <script src="JS/theme.js"></script>
</body>

</html>
