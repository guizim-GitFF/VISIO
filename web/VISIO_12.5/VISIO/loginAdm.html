<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/Marca/Simbolo/SimboloDark.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    
    <title>Login Administrador — VISIO</title>
</head>

<body>
    <header>
        <nav>
            <img src="assets/Marca/Logo/LogoDark.jpg"class="logo" alt="Logo VISIO" id="logo">
            <ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> Início</a></li>
                <li><a href="sobre.html"><i class="fa-solid fa-info-circle"></i> Sobre Nós</a></li>
                <li><a href="questoes.html"><i class="fa-solid fa-circle-question"></i> Questões</a></li>
                <li><a href="sensores.html"><i class="fa-solid fa-microchip"></i> Sensores</a></li>
                <li><a href="login.html"><i class="fa-solid fa-right-to-bracket"></i> Login</a></li><li><button id="theme-toggle">
                    <i id="icon-sun" class="fa-solid fa-sun"></i>
                    <i id="icon-moon" class="fa-solid fa-moon"></i>
                </button></li>
            </ul>
        </nav>
    </header>
    <main class="login-page">
        <div class="login-container">
            <div class="login-form">
                <h1>Login como administrador</h1>
                <p>Entre com as credenciais de administrador cadastradas no sistema.</p>
                <form action="#" method="post" id="formAdm">
                    <input type="email" name="email" id="email" placeholder="E-mail" autocomplete="username">
                    <span class="erro" id="erroEmail"></span>
                    <input type="password" name="senha" id="senha" placeholder="Senha" autocomplete="current-password">
                    <span class="erro" id="erroSenha"></span>
                    <br>
                    <button type="submit" class="btn-login-adm"><i class="fa-solid fa-right-to-bracket"></i> Entrar como
                        ADM</button>
                </form>
                <div class="login-footer">
                    <p><a href="login.html">Voltar ao login de usuário</a></p>
                </div>
            </div>
            <div class="login-image">
                <img src="assets/Marca/Icone/IconeDark.jpg"
                    alt="Ilustração representando login administrativo na plataforma VISIO">
            </div>
        </div>
    </main>
    <footer>
        &copy; 2026 VISIO – Visão Inteligente para Sensores IoT.
    </footer>
    <script src="JS/theme.js"></script>
    <script src="JS/validacaoAdm.js"></script>
</body>

</html>
