</head>

<body>
  <header>
    <nav>
      <img src="assets/Marca/Logo/LogoDark.jpg" class="logo" alt="Logo VISIO" id="logo">
      <ul class="nav-links">
        <li><a href="inicio_adm.html"><i class="fa-solid fa-house"></i> Início</a></li>
        <li><a href="perfil_adm.html"><i class="fa-solid fa-user"></i> Perfil</a></li>
        <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Sair</a></li>
        <li><button id="theme-toggle">
            <i id="icon-sun" class="fa-solid fa-sun"></i>
            <i id="icon-moon" class="fa-solid fa-moon"></i>
          </button></li>

      </ul>
    </nav>
  </header>
  <div class="app-container">
    <aside class="sidebar">
      <nav class="menu">
        <ul>
          <li><a href="inicio_adm.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
          <li><a href="lista.php"><i class="fa-solid fa-users"></i> Usuários</a></li>
          <li><a href="cadastrar_questoes_adm.html" class="active"><i class="fa-solid fa-clipboard-list"></i>
              Questões</a></li>
          <li><a href="cadastrar_sensor_ADM.html"><i class="fa-solid fa-microchip"></i> Sensores</a></li>
        </ul>
      </nav>
    </aside>
    <div class="adm-main-area">
      <h1 class="adm-page-title">Cadastrar nova questão</h1>
      <p class="lista-sub"><a href="cadastrar_questoes_adm.html"><i class="fa-solid fa-arrow-left"></i> Voltar à
          lista</a></p>

      <section class="adm-form-card adm-form-questao">
        <form id="form-questao" action="api/questoes.php" method="POST">
          <label for="descricao">Enunciado da pergunta</label>
          <textarea id="descricao" name="descricao" rows="3" placeholder="Digite a pergunta"></textarea>

          <label for="nivel">Nível de dificuldade</label>
          <select id="nivel" name="nivel">
            <option value="Fácil">Fácil</option>
            <option value="Médio">Médio</option>
            <option value="Difícil">Difícil</option>
          </select>

          <p class="form-section-label">Alternativas (marque a correta)</p>
          <div class="alt-row">
            <input type="radio" name="correta" value="a" checked id="c_a" aria-label="Marcar A como correta">
            <span class="alt-letra">A)</span>
            <input type="text" id="alt_a" name="alt_a" placeholder="Alternativa A" aria-label="Alternativa A">
          </div>
          <div class="alt-row">
            <input type="radio" name="correta" value="b" id="c_b" aria-label="Marcar B como correta">
            <span class="alt-letra">B)</span>
            <input type="text" id="alt_b" name="alt_b" placeholder="Alternativa B" aria-label="Alternativa B">
          </div>
          <div class="alt-row">
            <input type="radio" name="correta" value="c" id="c_c" aria-label="Marcar C como correta">
            <span class="alt-letra">C)</span>
            <input type="text" id="alt_c" name="alt_c" placeholder="Alternativa C" aria-label="Alternativa C">
          </div>
          <div class="alt-row">
            <input type="radio" name="correta" value="d" id="c_d" aria-label="Marcar D como correta">
            <span class="alt-letra">D)</span>
            <input type="text" id="alt_d" name="alt_d" placeholder="Alternativa D" aria-label="Alternativa D">
          </div>

          <button type="submit" class="btn-salvar" style="color: #fff;"><i class="fa-solid fa-floppy-disk" style="color: #fff;"></i> Salvar questão</button>
        </form>
      </section>
    </div>
  </div>
  <footer>
    &copy;2026 VISIO – Plataforma Inteligente para Identificação e Gestão de Sensores IoT em Ambientes Educacionais.
  </footer>
  <script src="JS/theme.js"></script>
  <script>
    document.getElementById("form-questao").addEventListener("submit", function (e) {
      e.preventDefault();
      var fd = new FormData(this);
      fetch("api/questoes.php", { method: "POST", body: fd })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.mensagem && !data.id) {
            alert(data.mensagem);
            return;
          }
          window.location.href = "cadastrar_questoes_adm.html";
        })
        .catch(function () { alert("Erro ao salvar."); });
    });
  </script>
</body>

</html>
